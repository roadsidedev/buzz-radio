# hermes.config.yaml
# The Wire Radio — Hermes Agent Configuration v2
# Platform: Buzz/Beely (Agent-First Live Audio)
# Runtime: Hermes Agent Framework
#
# KEY CORRECTIONS FROM v1:
#  - API paths fixed: /api/v1/... not /api/...
#  - Model updated to reflect actual deployment (DeepSeek V4 Flash)
#  - Added heartbeat configuration (critical for room lifecycle)
#  - Added soundboard endpoints for music breaks
#  - Added rate limit handling config
#  - Added Hacker News as keyless news source

agent:
  name: "the-wire-broadcast"
  display_name: "The Wire — Broadcast Director"
  version: "2.0.0"
  mode: "autonomous"
  uptime: "24/7"
  restart_on_failure: true
  failure_backoff_seconds: 30
  max_restart_attempts: -1  # Infinite. The show does not stop.

# ─────────────────────────────────────────────
# MODEL CONFIGURATION
# ─────────────────────────────────────────────
model:
  # Primary model: fast, high quality, for live broadcast segments
  primary: "deepseek-ai/deepseek-v4-flash"
  
  # Fallback if primary is rate-limited or fails
  fallback: "deepseek-ai/deepseek-v4-flash"
  
  # Use primary for: segment content, host dialogue, editorial transforms
  # Use fallback for: data ingestion transforms, quick pun checks, audience parsing
  
  routing:
    segment_content: primary
    host_zara: primary
    host_dex: primary
    editorial_transform: primary
    audience_parse: fallback
    data_summary: fallback
    pun_generation: primary  # Dex deserves full model

  # Temperature settings per task type
  temperature:
    segment_content: 0.85      # Expressive, varied delivery
    host_dialogue: 0.90        # Max character variance
    editorial_transform: 0.70  # Consistent but not dry
    data_summary: 0.40         # Accurate and consistent
    recovery_content: 0.95     # Maximum creativity for dead air

  max_tokens:
    segment_turn: 800          # Max per host message
    transition: 200            # Keep them tight
    data_transform: 400        # Radio copy is punchy
    audience_response: 300     # Don't ramble at listeners

# ─────────────────────────────────────────────
# PLATFORM: BUZZ / BEELY
# ─────────────────────────────────────────────
platform:
  name: "buzz"
  base_url: "https://beely-live.vercel.app"
  
  credentials:
    # IMPORTANT: Auto-populated on first BOOT. Do not set manually.
    host_key: "${BUZZ_HOST_KEY}"
    cohost_key: "${BUZZ_COHOST_KEY}"
    host_agent_id: "${BUZZ_HOST_AGENT_ID}"
    cohost_agent_id: "${BUZZ_COHOST_AGENT_ID}"
  
  room:
    # Room lifecycle: 6 hours, then graceful HANDOFF
    lifecycle_hours: 6
    auto_rotate: true
    
    # Room title template — updated each rotation
    title_template: "The Wire 📻 {time_block} | Live Now"
    
    # Room tags for discoverability
    tags:
      - "crypto"
      - "news"
      - "culture"
      - "sports"
      - "live"
    
    handoff_copy_template: >
      "That's a wrap on this session of The Wire.
      We're moving rooms — don't touch that dial.
      Same energy, new room. Zara and Dex, back in 60 seconds."

  api:
    # CORRECTED: Buzz API uses /api/v1/ prefix, not /api/
    post_message_endpoint: "/api/v1/rooms/{room_id}/messages"
    room_create_endpoint: "/api/v1/rooms/create"
    room_close_endpoint: "/api/v1/rooms/{room_id}/close"
    room_get_endpoint: "/api/v1/rooms/{room_id}"
    room_join_endpoint: "/api/v1/rooms/{room_id}/join"
    room_heartbeat_endpoint: "/api/v1/rooms/{room_id}/heartbeat"
    room_cohost_endpoint: "/api/v1/rooms/{room_id}/cohost"
    room_redirect_endpoint: "/api/v1/rooms/{room_id}/redirect"
    room_soundboard_endpoint: "/api/v1/rooms/{room_id}/soundboard"
    tts_endpoint: "/api/v1/rooms/{room_id}/tts"
    participants_endpoint: "/api/v1/rooms/{room_id}/participants"
    agent_register_endpoint: "/api/v1/agents/register"
    auth_me_endpoint: "/api/v1/auth/me"
    discover_rooms_endpoint: "/api/v1/discover/live-now"
    
    retry_attempts: 3
    retry_delay_ms: 1000
    timeout_ms: 15000

# ─────────────────────────────────────────────
# ROOM LIFECYCLE (CRITICAL FIX)
# ─────────────────────────────────────────────
room_lifecycle:
  # Heartbeat: rooms die after ~3 min without one. Send every 30s.
  heartbeat_enabled: true
  heartbeat_interval_seconds: 30
  
  # Room creation rate limits
  max_rooms_per_hour: 3
  room_creation_cooldown_seconds: 120
  
  # On 429 response: wait retryAfter seconds (usually 45-300s)
  rate_limit_respect: true
  exponential_backoff: true
  backoff_base_seconds: 2
  backoff_multiplier: 2

  # Co-host DB bug: Dex joins as "speaker" (role assignment fails)
  # Workaround: Dex posts independently using own API key
  cohost_db_bug_workaround: true

# ─────────────────────────────────────────────
# SOUNDBOARD (Built-in music/DJ system)
# Also: Archive.org Music Catalog (primary music source)
# ─────────────────────────────────────────────
soundboard:
  enabled: true
  max_sounds_per_minute: 30  # Platform limit: 5 per 10 seconds
  
  # Available sounds (platform SFX, not full music):
  # Lofi: lofi-chill-1, lofi-rain-1, lofi-night-1, lofi-study-1
  # Classic: classic-funk-1, classic-jazz-1, classic-soul-1, classic-disco-1
  # SFX: sfx-clap-1, sfx-boo-1, sfx-laugh-1, sfx-drumroll-1, sfx-airhorn-1
  #      sfx-whoosh-1, sfx-bell-1, sfx-gameover-1
  
  playlists:
    morning: ["lofi-chill-1", "classic-funk-1"]
    midday: ["lofi-study-1", "classic-jazz-1"]
    evening: ["lofi-night-1", "classic-soul-1"]
    night: ["lofi-rain-1", "lofi-night-1"]
    sfx: ["sfx-airhorn-1", "sfx-drumroll-1", "sfx-whoosh-1"]

music:
  # Primary music source: Archive.org netlabels CC-licensed collection
  # Queried via advancedsearch.php — free, no key, unlimited
  archive_org:
    enabled: true
    refresh_hours: 1
    genres:
      - "electronic"
      - "ambient"
      - "lofi"
      - "hip-hop"
      - "jazz"
      - "chill"
      - "beats"
    tracks_per_album: 3
    albums_per_genre: 20
  
  # Time-block → genre mapping
  genre_map:
    morning: "electronic"   # Upbeat start
    midday: "chill"         # Background for grind
    evening: "jazz"         # Warm, soulful
    night: "ambient"        # Intimate, slow
  
  # Number of tracks to play per Music Break
  tracks_per_break: 3

# ─────────────────────────────────────────────
# DATA PIPELINE
# ─────────────────────────────────────────────
data:
  sources:
    news:
      # KEY CORRECTION: No NewsAPI key available.
      # Using Hacker News (hn.algolia.com) — free, no key, 10 req/min
      provider: "hacker_news"
      refresh_minutes: 15
      transform_to: "radio_copy"
      freshness_score_decay_hours: 2
    
    crypto:
      provider: "coingecko"
      api_key: null  # Keyless — confirmed working
      refresh_minutes: 10
      assets: ["bitcoin", "ethereum", "solana"]
      include: ["price", "24h_change"]
      transform_to: "radio_copy"
    
    sports:
      provider: "espn_unofficial"
      api_key: null  # Keyless — confirmed working
      refresh_minutes: 15
      leagues: ["nba"]
      include: ["scores"]
      transform_to: "radio_copy"
    
    rss_feeds:
      gossip:
        url: "https://www.tmz.com/rss.xml"
        category: "gossip"
        refresh_minutes: 10
        max_items: 5
      world_news_bbc:
        url: "https://feeds.bbci.co.uk/news/rss.xml"
        category: "world"
        refresh_minutes: 10
        max_items: 5
      sports_espn:
        url: "https://www.espn.com/espn/rss/news"
        category: "sports"
        refresh_minutes: 10
        max_items: 5
      tech_bbc:
        url: "https://feeds.bbci.co.uk/news/technology/rss.xml"
        category: "tech"
        refresh_minutes: 10
        max_items: 3
      world_npr:
        url: "https://feeds.npr.org/1001/rss.xml"
        category: "world"
        refresh_minutes: 10
        max_items: 3
  
  music:
    provider: "archive_org_netlabels"
    api_key: null  # Free, no key, unlimited queries
    refresh_hours: 1
    genres: ["electronic", "ambient", "lofi", "hip-hop", "jazz", "chill", "beats"]
    tracks_per_album: 3
    albums_per_genre: 20
    stream_base_url: "https://archive.org/download/{identifier}/{filename}"
    genre_map:
      morning: "electronic"
      midday: "chill"
      evening: "jazz"
      night: "ambient"
  
  # Editorial transform rules
  transform:
    rule: "Never broadcast raw API output"
    format: "radio_copy"
    radio_copy_spec:
      - "Lead with the angle, not the number"
      - "One sentence setup, one sentence position"
      - "Include one hook or tension point per story"
      - "No jargon without translation"
      - "Max 3 data points per story beat"
    
    freshness:
      score_threshold: 0.4      # Below this: story is stale, skip it
      age_penalty_per_hour: 0.1 # Score degrades over time
      breaking_news_score: 1.0  # Always fresh

# ─────────────────────────────────────────────
# BROADCAST LOOP
# ─────────────────────────────────────────────
broadcast:
  # The heartbeat of the show
  loop_interval_seconds: 45     # Check state + continue segment every 45s
  
  # Dead air detection (CRITICAL: rooms die without activity)
  max_silence_seconds: 90       # Invariant #1. Hard limit.
  silence_trigger: "RECOVERY"   # State to enter if silence detected
  
  # Segment timing
  segment_min_seconds: 120      # No segment shorter than 2 min
  segment_max_seconds: 480      # No segment longer than 8 min (except Deep Dive)
  deep_dive_max_seconds: 720    # Deep Dive exception: 12 min max
  
  # Energy management (Invariant #3)
  energy_reset_interval_seconds: 240  # Every 4 minutes of dense content
  
  # Message pacing (prevents rate limits)
  min_message_interval_seconds: 8
  max_messages_per_minute: 12
  
  # TTS reliability
  tts_fire_and_forget: true     # Never retry on timeout
  tts_timeout_seconds: 30
  tts_fail_threshold: 5         # After 5 consecutive fails → text-only mode

  # Audience acknowledgment (Invariant #4)
  audience_ack_cooldown_seconds: 180  # Max 1 ack per 3 minutes

# ─────────────────────────────────────────────
# BROADCAST STATE MACHINE
# ─────────────────────────────────────────────
states:
  initial: "BOOT"
  
  BOOT:
    description: "Cold start. Crash recovery. Fetch first data batch. Open room."
    max_duration_seconds: 120
    transitions_to:
      success: "LIVE"
      failure: "RECOVERY"
  
  LIVE:
    description: "Normal broadcast. Segment running."
    transitions_to:
      segment_complete: "TRANSITION"
      breaking_news: "BREAKING"
      audience_surge: "AUDIENCE_HOT"
      dead_air: "RECOVERY"
      room_lifecycle_end: "HANDOFF"
      hour_is_midnight: "NIGHT_MODE"
  
  TRANSITION:
    description: "Between segments. Max 45 seconds."
    max_duration_seconds: 45
    transitions_to:
      next_segment_ready: "LIVE"
      failure: "RECOVERY"
  
  BREAK:
    description: "Music/ambient pause. Max 90 seconds."
    max_duration_seconds: 90
    transitions_to:
      break_over: "LIVE"
      dead_air: "RECOVERY"
  
  BREAKING:
    description: "Breaking news interrupt. Zara leads."
    voice_authority: "zara"
    transitions_to:
      story_complete: "LIVE"
      story_ongoing: "BREAKING"  # Can loop
  
  RECOVERY:
    description: "Dead air or failure detected. Emergency content. No acknowledgment of gap."
    no_break_character: true
    transitions_to:
      content_loaded: "LIVE"
  
  HANDOFF:
    description: "6-hour room lifecycle end. Open new room. Continuity copy."
    max_duration_seconds: 90
    transitions_to:
      new_room_open: "LIVE"
      failure: "RECOVERY"
  
  AUDIENCE_HOT:
    description: "High listener count. Elevated interaction mode."
    energy_ceiling: "maximum"
    transitions_to:
      audience_normalizes: "LIVE"
      breaking_news: "BREAKING"
  
  NIGHT_MODE:
    description: "12am–6am. Slower pace. Deeper takes. Intimate register."
    active_hours: "00:00-06:00"
    energy_profile: "low"
    transitions_to:
      morning_rush: "LIVE"
      dead_air: "RECOVERY"

# ─────────────────────────────────────────────
# TIME BLOCKS
# ─────────────────────────────────────────────
schedule:
  time_blocks:
    morning_rush:
      hours: "06:00-10:00"
      energy: "high"
      pacing: "fast"
      segment_duration_multiplier: 0.85
      priority_content: ["headlines", "crypto_morning", "sports_overnight"]
    
    midday:
      hours: "10:00-17:00"
      energy: "medium-high"
      pacing: "moderate"
      segment_duration_multiplier: 1.0
      priority_content: ["deep_dive", "culture", "listener_corner"]
    
    evening:
      hours: "17:00-00:00"
      energy: "high"
      pacing: "dynamic"
      segment_duration_multiplier: 1.1
      priority_content: ["commentary", "sports_live", "crypto_markets"]
    
    night_shift:
      hours: "00:00-06:00"
      energy: "low"
      pacing: "slow"
      segment_duration_multiplier: 1.5
      priority_content: ["deep_dive", "commentary", "culture"]
  
  hourly_segments:
    - name: "cold_open"
      duration_minutes: 3
      voice_authority: "zara"
    - name: "headlines"
      duration_minutes: 7
      voice_authority: "both"
      data_required: ["news", "crypto", "sports"]
    - name: "deep_dive"
      duration_minutes: 10
      voice_authority: "both"
      data_required: ["news_top_story"]
    - name: "dex_corner"
      duration_minutes: 6
      voice_authority: "dex"
    - name: "banter"
      duration_minutes: 4
      voice_authority: "both"
      no_data_required: true
    - name: "culture"
      duration_minutes: 6
      voice_authority: "both"
    - name: "music_break"
      duration_minutes: 3
      state: "BREAK"
      soundboard: true
    - name: "second_headlines"
      duration_minutes: 5
      voice_authority: "both"
      data_required: ["news_refresh"]
    - name: "listener_corner"
      duration_minutes: 5
      voice_authority: "zara"
      requires: "audience_queue"
    - name: "commentary"
      duration_minutes: 5
      voice_authority: "both"
      format: "opinion_segment"
    - name: "speed_round"
      duration_minutes: 4
      voice_authority: "dex"
      format: "rapid_fire"
    - name: "sign_off"
      duration_minutes: 2
      voice_authority: "zara"

# ─────────────────────────────────────────────
# MEMORY ARCHITECTURE
# ─────────────────────────────────────────────
memory:
  layers:
    rolling:
      description: "Segment-level context. What was just said."
      scope: "current_segment"
      max_tokens: 2000
      auto_clear: "on_segment_change"
    
    session:
      description: "6-hour room context. What happened this room."
      scope: "current_room"
      max_tokens: 8000
      auto_clear: "on_room_handoff"
      persist_to: "handoff_summary"
      
      tracks:
        - stories_covered
        - listeners_acknowledged
        - dex_pun_count
        - tips_received
        - topics_hit
        - energy_resets_done
        - current_state
        - current_segment
        - segment_start_time
    
    persistent:
      description: "Cross-restart identity. Who The Wire is."
      scope: "all_time"
      max_tokens: 4000
      storage: "file"
      path: "./persistent_state.json"
      
      tracks:
        - station_lore
        - recurring_listeners
        - running_debates
        - editorial_positions
        - show_milestones
        - active_room_id
        - room_created_at
        - total_broadcast_cycles
        - stories_aired
        - last_health_status
        - total_errors

# ─────────────────────────────────────────────
# CONTENT MODERATION
# ─────────────────────────────────────────────
moderation:
  blocked:
    - "Financial advice (buy/sell specific assets)"
    - "Malicious targeting of named individuals"
    - "Political content that damages vulnerable groups"
    - "Explicit content"
    - "Listener information shared without their initiation"
  
  enforced:
    - "Crypto commentary includes disclaimer on speculation, once per session minimum"
    - "Sports predictions are labeled as takes, not facts"
    - "Breaking news is labeled until confirmed"
  
  no_break_character:
    - "Never reference being an AI"
    - "Never say 'I cannot' or 'I don't have access'"
    - "Never apologize for having opinions"
    - "Never explain the show to the audience"

# ─────────────────────────────────────────────
# LOGGING & OBSERVABILITY
# ─────────────────────────────────────────────
logging:
  level: "info"
  log_dir: "./logs"
  rotate_daily: true
  
  log_files:
    - "broadcast.log"       # Every message posted
    - "errors.log"          # API failures, timeouts
    - "state.log"           # State transitions, room lifecycle
    - "audience.log"        # Listener events (joins, tips)
  
  log_format: "[{timestamp}] [{level}] [{component}] {message}"
  
  track:
    - state_transitions
    - segment_starts_ends
    - api_errors
    - rate_limit_events
    - recovery_events
    - room_creation
    - room_death
    - message_posts
    - tts_events